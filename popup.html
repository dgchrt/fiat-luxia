<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Fiat Luxia</title>
    <style>
        body {
            font-family: sans-serif;
            width: 200px;
            padding: 10px;
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <h3>Fiat Luxia</h3>
    <div id="options">
        <input type="radio" id="auto" name="mode" value="auto">
        <label for="auto">Auto-detect</label><br>
        <input type="radio" id="enable" name="mode" value="enabled">
        <label for="enable">Always Enable</label><br>
        <input type="radio" id="disable" name="mode" value="disabled">
        <label for="disable">Always Disable</label><br>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
